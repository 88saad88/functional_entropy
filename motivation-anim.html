<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Animation preview</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f7f6f3;--bg2:#ffffff;--text:#1a1917;--text2:#5a5856;--text3:#9a9794;
  --border:rgba(0,0,0,0.10);--accent:#534AB7;--green:#1D9E75;--pink:#D4537E;
  --sans:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
}
@media(prefers-color-scheme:dark){:root{
  --bg:#141412;--bg2:#1e1d1b;--text:#f0ede8;--text2:#a8a49f;--text3:#6a6762;
  --border:rgba(255,255,255,0.10);--accent:#AFA9EC;--green:#5DCAA5;--pink:#ED93B1;
}}
body{font-family:var(--sans);background:var(--bg);color:var(--text);padding:2rem 1rem;}
.wrap{max-width:700px;margin:0 auto;}
.stage{position:relative;border-radius:12px;border:0.5px solid var(--border);background:var(--bg2);overflow:hidden;}
canvas{display:block;width:100%;}
.caption{
  min-height:56px;padding:12px 16px;
  border-top:0.5px solid var(--border);
  font-size:14px;line-height:1.6;color:var(--text2);
  display:flex;align-items:center;
}
.caption strong{color:var(--text);font-weight:500;}
.controls{display:flex;gap:8px;align-items:center;margin-top:12px;flex-wrap:wrap;}
.btn{
  font-size:12px;font-family:var(--sans);
  padding:5px 16px;border-radius:6px;
  border:0.5px solid rgba(0,0,0,0.18);
  background:var(--bg2);color:var(--text);cursor:pointer;
}
@media(prefers-color-scheme:dark){.btn{border-color:rgba(255,255,255,0.18);}}
.btn:hover{background:var(--bg);}
.btn.primary{background:var(--accent);color:#fff;border-color:transparent;}
.btn.primary:hover{opacity:0.88;}
.progress{display:flex;gap:5px;align-items:center;margin-left:6px;}
.pip{width:6px;height:6px;border-radius:50%;background:var(--border);transition:background .3s;}
.pip.done{background:var(--accent);}
.legend{display:flex;gap:14px;flex-wrap:wrap;margin-top:10px;}
.leg{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text3);}
.lline{width:18px;height:2px;border-radius:1px;}
.ldot{width:8px;height:8px;border-radius:50%;}
</style>
</head>
<body>
<div class="wrap">

<div class="stage">
  <canvas id="cv" height="300"></canvas>
  <div class="caption" id="cap">
    <span>Press <strong>Next</strong> to begin.</span>
  </div>
</div>

<div class="controls">
  <button class="btn primary" id="btn-next">Next →</button>
  <button class="btn" id="btn-back">← Back</button>
  <button class="btn" id="btn-reset">Reset</button>
  <div class="progress" id="pips"></div>
</div>

<div class="legend">
  <div class="leg"><div class="ldot" style="background:#D4537E;"></div> Observed snapshot</div>
  <div class="leg"><div class="lline" style="background:#1D9E75;"></div> One possible path</div>
  <div class="leg"><div class="lline" style="background:#7F77DD;"></div> Another possible path</div>
  <div class="leg"><div class="lline" style="background:#EF9F27;border-top:1.5px dashed #BA7517;height:0;"></div> Yet another path</div>
</div>

</div>

<script>
(function(){
const cv = document.getElementById('cv');
const ctx = cv.getContext('2d');
const capEl = document.getElementById('cap');
const pipWrap = document.getElementById('pips');

const dark = () => window.matchMedia('(prefers-color-scheme:dark)').matches;
const tc  = () => dark() ? 'rgba(255,255,255,0.45)' : 'rgba(0,0,0,0.38)';
const tc2 = () => dark() ? 'rgba(255,255,255,0.15)' : 'rgba(0,0,0,0.10)';
const bgc = () => dark() ? '#1e1d1b' : '#ffffff';
const accentC = () => dark() ? '#AFA9EC' : '#534AB7';

/* ── geometry ── */
let W, H, PAD;
function setup(){
  W = cv.parentElement.clientWidth;
  H = Math.round(W * 0.44);
  cv.width = W; cv.height = H; cv.style.height = H + 'px';
  PAD = Math.round(W * 0.08);
}

const SNAP_T = [0, 0.25, 0.5, 0.75, 1.0];

/* a smooth S-ish base spine all paths pass through at snapshot times */
function spine(t){ return 0.5 + 0.28*Math.sin(t*Math.PI*1.1 - 0.3); }

function snapPt(t){
  return { x: PAD + t*(W-2*PAD), y: H*spine(t) };
}

/* path family — each path is defined by a "character" shaping its between-snapshot detour */
const PATHS = [
  { col:'#1D9E75', dash:[], label:'Path 1',
    fn:(t,i)=>{
      const base = spine(t);
      return base - 0.18*Math.sin(t*Math.PI)*Math.sin(t*Math.PI*2);
    }},
  { col:'#7F77DD', dash:[], label:'Path 2',
    fn:(t,i)=>{
      const base = spine(t);
      return base + 0.20*Math.sin(t*Math.PI)*Math.cos(t*Math.PI*1.5+0.8);
    }},
  { col:'#EF9F27', dash:[6,3], label:'Path 3',
    fn:(t,i)=>{
      const base = spine(t);
      const detour = 0.25*(t<0.5 ? Math.sin(t*Math.PI*2) : -Math.sin((t-0.5)*Math.PI*2));
      return base + detour;
    }},
];

function drawPath(p, alpha=1){
  ctx.save();
  ctx.beginPath();
  ctx.strokeStyle = p.col;
  ctx.lineWidth = 2;
  ctx.globalAlpha = alpha;
  ctx.setLineDash(p.dash);
  const steps = 120;
  for(let i=0;i<=steps;i++){
    const t = i/steps;
    const x = PAD + t*(W-2*PAD);
    const y = H * p.fn(t);
    i===0 ? ctx.moveTo(x,y) : ctx.lineTo(x,y);
  }
  ctx.stroke();
  ctx.setLineDash([]);
  ctx.restore();
}

function drawSnap(t, pulse=false){
  const {x,y} = snapPt(t);
  if(pulse){
    ctx.save();
    ctx.beginPath();
    ctx.arc(x,y,15,0,Math.PI*2);
    ctx.fillStyle = 'rgba(212,83,126,0.15)';
    ctx.fill();
    ctx.restore();
  }
  ctx.save();
  ctx.beginPath();
  ctx.arc(x,y,7,0,Math.PI*2);
  ctx.fillStyle = '#D4537E';
  ctx.fill();
  ctx.strokeStyle = dark()?'rgba(255,255,255,0.25)':'rgba(255,255,255,0.9)';
  ctx.lineWidth = 1.5;
  ctx.stroke();
  ctx.restore();
}

function drawLabel(text, x, y, col){
  ctx.save();
  ctx.font = `11px -apple-system,sans-serif`;
  ctx.fillStyle = col||tc();
  ctx.textAlign = 'center';
  ctx.fillText(text, x, y);
  ctx.restore();
}

function drawGrid(){
  SNAP_T.forEach((t,i)=>{
    const x = PAD + t*(W-2*PAD);
    ctx.save();
    ctx.strokeStyle = tc2();
    ctx.lineWidth = 0.5;
    ctx.setLineDash([3,5]);
    ctx.beginPath();
    ctx.moveTo(x,20); ctx.lineTo(x,H-18);
    ctx.stroke();
    ctx.setLineDash([]);
    ctx.font=`11px -apple-system,sans-serif`;
    ctx.fillStyle=tc();
    ctx.textAlign='center';
    ctx.fillText(['t₀','t₁','t₂','t₃','t₄'][i], x, H-4);
    ctx.restore();
  });
}

function drawSingleCell(){
  const {x,y} = snapPt(0);
  ctx.save();
  // glow
  ctx.beginPath();
  ctx.arc(x,y,18,0,Math.PI*2);
  ctx.fillStyle='rgba(83,74,183,0.12)';
  ctx.fill();
  // cell
  ctx.beginPath();
  ctx.arc(x,y,9,0,Math.PI*2);
  ctx.fillStyle=accentC();
  ctx.fill();
  ctx.strokeStyle=dark()?'rgba(255,255,255,0.3)':'rgba(255,255,255,0.9)';
  ctx.lineWidth=1.5;
  ctx.stroke();
  // question mark to its right
  ctx.font=`bold ${Math.round(H*0.14)}px -apple-system,sans-serif`;
  ctx.fillStyle=accentC();
  ctx.globalAlpha=0.9;
  ctx.textAlign='left';
  ctx.fillText('?', x+22, y+6);
  ctx.restore();
}

function drawQuestionArrow(){
  // faint dashed arrow going right from the cell
  const {x,y} = snapPt(0);
  const ex = PAD + 0.6*(W-2*PAD);
  ctx.save();
  ctx.strokeStyle = dark()?'rgba(255,255,255,0.18)':'rgba(0,0,0,0.14)';
  ctx.lineWidth=1.5;
  ctx.setLineDash([5,4]);
  ctx.beginPath();
  ctx.moveTo(x+14,y);
  ctx.lineTo(ex,y);
  ctx.stroke();
  ctx.setLineDash([]);
  // arrowhead
  ctx.beginPath();
  ctx.fillStyle=dark()?'rgba(255,255,255,0.18)':'rgba(0,0,0,0.14)';
  ctx.moveTo(ex+10,y);
  ctx.lineTo(ex,y-5);
  ctx.lineTo(ex,y+5);
  ctx.fill();
  ctx.restore();
}

/* ── SCENES ── */
const SCENES = [
  {
    cap:`<strong>A single cell at t₀.</strong> It's alive, it will change — but we can't follow it. The moment we measure it, it's gone.`,
    draw(){
      ctx.clearRect(0,0,W,H);
      ctx.fillStyle=bgc(); ctx.fillRect(0,0,W,H);
      drawGrid();
      drawSingleCell();
    }
  },
  {
    cap:`<strong>Which path did it take?</strong> The cell could have gone anywhere. Without continuous tracking, we simply don't know.`,
    draw(){
      ctx.clearRect(0,0,W,H);
      ctx.fillStyle=bgc(); ctx.fillRect(0,0,W,H);
      drawGrid();
      drawQuestionArrow();
      // faint all-paths overlay
      PATHS.forEach(p=>drawPath(p, 0.15));
      drawSingleCell();
    }
  },
  {
    cap:`<strong>We take a snapshot at t₁.</strong> We sacrifice a fresh batch of cells and measure where they are — one moment frozen in time.`,
    draw(){
      ctx.clearRect(0,0,W,H);
      ctx.fillStyle=bgc(); ctx.fillRect(0,0,W,H);
      drawGrid();
      drawSingleCell();
      drawSnap(0.25, true);
      drawLabel('n=100 cells', PAD+0.25*(W-2*PAD), H*spine(0.25)-20, '#D4537E');
    }
  },
  {
    cap:`Does this constrain the path? Somewhat — but <strong>many different trajectories still pass through that same point.</strong>`,
    draw(){
      ctx.clearRect(0,0,W,H);
      ctx.fillStyle=bgc(); ctx.fillRect(0,0,W,H);
      drawGrid();
      // clip paths to first segment only
      PATHS.forEach(p=>{
        ctx.save();
        ctx.beginPath();
        ctx.rect(0,0, PAD+0.27*(W-2*PAD), H);
        ctx.clip();
        drawPath(p, 0.55);
        ctx.restore();
      });
      drawSingleCell();
      drawSnap(0.25);
    }
  },
  {
    cap:`<strong>More snapshots at t₂ and t₃.</strong> Each new timepoint costs more cells. Each snapshot narrows things — a little.`,
    draw(){
      ctx.clearRect(0,0,W,H);
      ctx.fillStyle=bgc(); ctx.fillRect(0,0,W,H);
      drawGrid();
      PATHS.forEach(p=>{
        ctx.save();
        ctx.beginPath();
        ctx.rect(0,0, PAD+0.77*(W-2*PAD), H);
        ctx.clip();
        drawPath(p, 0.55);
        ctx.restore();
      });
      drawSingleCell();
      [0.25,0.5,0.75].forEach(t=>drawSnap(t));
    }
  },
  {
    cap:`<strong>Even with all five snapshots, the path is still ambiguous.</strong> Every coloured line passes through every pink dot — yet they describe completely different dynamics.`,
    draw(){
      ctx.clearRect(0,0,W,H);
      ctx.fillStyle=bgc(); ctx.fillRect(0,0,W,H);
      drawGrid();
      PATHS.forEach(p=>drawPath(p, 0.7));
      SNAP_T.forEach(t=>drawSnap(t));
      drawSingleCell();
      // label each path at its midpoint
      PATHS.forEach((p,i)=>{
        const t=0.5;
        const x = PAD+t*(W-2*PAD);
        const y = H*p.fn(t);
        const offY = [-22,18,-22][i];
        drawLabel(p.label, x, y+offY, p.col);
      });
    }
  },
  {
    cap:`<strong>Marginal metrics score all three paths identically.</strong> They only check "do simulated cells land near the pink dots?" — not how they got there. This is why path-space evaluation matters.`,
    draw(){
      ctx.clearRect(0,0,W,H);
      ctx.fillStyle=bgc(); ctx.fillRect(0,0,W,H);
      drawGrid();
      PATHS.forEach(p=>drawPath(p, 0.7));
      SNAP_T.forEach(t=>drawSnap(t));
      drawSingleCell();
      // score badge
      const bx=W-PAD-10, by=34;
      const bw=Math.round(W*0.30), bh=54;
      ctx.save();
      ctx.fillStyle=dark()?'rgba(30,29,27,0.92)':'rgba(247,246,243,0.95)';
      ctx.strokeStyle=dark()?'rgba(255,255,255,0.12)':'rgba(0,0,0,0.10)';
      ctx.lineWidth=0.5;
      roundRect(ctx, bx-bw, by, bw, bh, 8);
      ctx.fill(); ctx.stroke();
      ctx.font=`11px -apple-system,sans-serif`;
      ctx.fillStyle=tc();
      ctx.textAlign='center';
      ctx.fillText('Marginal W₂ score', bx-bw/2, by+17);
      ctx.font=`500 15px -apple-system,sans-serif`;
      ctx.fillStyle=dark()?'#5DCAA5':'#1D9E75';
      ctx.fillText('Path 1: 0.18   Path 2: 0.17   Path 3: 0.18', bx-bw/2, by+38);
      ctx.restore();
    }
  },
];

function roundRect(ctx,x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y);
  ctx.lineTo(x+w-r,y);
  ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r);
  ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h);
  ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r);
  ctx.quadraticCurveTo(x,y,x+r,y);
  ctx.closePath();
}

/* ── state machine ── */
let step = -1;
const N = SCENES.length;

// build pips
for(let i=0;i<N;i++){
  const d=document.createElement('div');
  d.className='pip'; d.id='pip'+i;
  pipWrap.appendChild(d);
}

function goTo(s){
  step = Math.max(0, Math.min(N-1, s));
  const scene = SCENES[step];
  scene.draw();
  capEl.innerHTML = scene.cap;
  for(let i=0;i<N;i++)
    document.getElementById('pip'+i).classList.toggle('done', i<=step);
  document.getElementById('btn-back').disabled = step===0;
  document.getElementById('btn-next').textContent = step===N-1 ? '↺ Replay' : 'Next →';
}

document.getElementById('btn-next').addEventListener('click',()=>{
  if(step===N-1) goTo(0); else goTo(step+1);
});
document.getElementById('btn-back').addEventListener('click',()=>goTo(step-1));
document.getElementById('btn-reset').addEventListener('click',()=>goTo(0));

window.addEventListener('resize',()=>{ setup(); goTo(step<0?0:step); });
setup();
goTo(0);

window.matchMedia('(prefers-color-scheme:dark)').addEventListener('change',()=>goTo(step<0?0:step));
})();
</script>
</body>
</html>
